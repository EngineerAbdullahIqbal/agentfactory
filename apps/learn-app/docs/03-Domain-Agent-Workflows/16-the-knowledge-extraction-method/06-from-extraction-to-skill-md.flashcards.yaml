deck:
  id: "ch16-06-from-extraction-to-skill-md"
  title: "From Extraction to SKILL.md"
  description: "Writing the Persona, Questions, and Principles sections from extraction outputs, testability criterion, and uncertainty calibration vocabulary."
  tags: ["SKILL.md", "persona", "questions-section", "principles", "testability", "calibration"]
  version: 1

cards:
  - id: "ch16-06-three-persona-questions-001"
    front: "What three questions must the Persona section answer?"
    back: "1. What is this agent's professional level and authority? (Not 'experienced' — the specific seniority and scope)\n2. What does this agent value in its own outputs? (The specific quality standards it holds itself to)\n3. What does it do when it does not know? (Its uncertainty behaviour — the most important question)"
    tags: ["persona", "three-questions"]
    difficulty: "basic"

  - id: "ch16-06-persona-bridge-002"
    front: "How do Ch16's three Persona questions relate to Ch15's four structural questions?"
    back: "Ch15's four questions (professional standing, relationship to user, tone, what it will never claim) define what a Persona contains. Ch16's three questions organise the interview output into functional Persona language — they are a writing method for producing the content, not a replacement of the structural definition."
    tags: ["persona", "ch15-bridge"]
    difficulty: "intermediate"
    why: "Tests understanding of the relationship between architectural definition and extraction methodology"

  - id: "ch16-06-vague-vs-functional-003"
    front: "Why does 'You are an experienced financial professional who provides helpful and accurate analysis' fail as a Persona?"
    back: "It does not answer any of the three questions with specificity. It does not define authority level, does not specify quality standards, and critically does not specify what the agent does when data is incomplete or uncertain. It governs no behaviour in ambiguous situations."
    tags: ["persona", "common-mistake"]
    difficulty: "basic"

  - id: "ch16-06-questions-two-halves-004"
    front: "Why does the Questions section need both a capability list and an out-of-scope list?"
    back: "Without explicit out-of-scope boundaries, the agent will attempt queries adjacent to its capabilities — producing confident-sounding output in areas where it has no grounded expertise. A credit analyst agent without out-of-scope boundaries might venture into lending recommendations, where errors carry professional consequences."
    tags: ["questions-section", "out-of-scope"]
    difficulty: "intermediate"

  - id: "ch16-06-testability-005"
    front: "What makes a SKILL.md Principle testable?"
    back: "A testable principle describes a specific behaviour in a specific situation that a reviewer can observe in the output and score as present or absent. 'Be accurate' is untestable. 'When data contradicts a user-stated figure, surface the discrepancy explicitly and ask for clarification' is testable."
    tags: ["testability-criterion", "principles"]
    difficulty: "intermediate"
    why: "Tests the core distinction between aspirational and operational principles"

  - id: "ch16-06-untestable-example-006"
    front: "Why does 'Prioritise patient safety in all assessments' fail the testability criterion?"
    back: "No reviewer can determine from a single output whether the agent 'prioritised patient safety' because the instruction does not specify what that means operationally, what behaviour it produces, or what it prevents. A testable version: 'When triage indicates a potentially serious condition, flag for immediate clinician review and include the specific indicators that triggered the flag.'"
    tags: ["testability-criterion", "failure-example"]
    difficulty: "intermediate"

  - id: "ch16-06-calibration-vocabulary-007"
    front: "What are the five levels of the uncertainty calibration vocabulary?"
    back: "1. Confirmed by data (direct evidence in attached sources)\n2. Supported by evidence (strong inference from available data)\n3. Suggested by available information (reasonable inference with gaps)\n4. Possible but unconfirmed (plausible but not evidenced)\n5. Speculative (beyond available evidence)\nThe agent never uses a higher level than the evidence supports."
    tags: ["calibration-vocabulary", "uncertainty"]
    difficulty: "intermediate"

  - id: "ch16-06-calibration-importance-008"
    front: "Why is uncertainty calibration critical in professional deployment?"
    back: "An agent that states inferences as confirmed findings leads decision-makers to act on uncertain information as if it were verified. An agent that over-hedges well-supported conclusions undermines its own usefulness. The calibration vocabulary ensures the confidence level matches the evidence."
    tags: ["calibration", "professional-deployment"]
    difficulty: "intermediate"

  - id: "ch16-06-north-star-to-persona-009"
    front: "How does the north star summary become the Persona section?"
    back: "The expert's quality standards (epistemic rigour, communication preferences), non-negotiable constraints (what they never do), and professional character (how they handle uncertainty) from the north star summary translate directly into the three Persona questions — authority, values, and uncertainty behaviour."
    tags: ["north-star", "persona", "translation"]
    difficulty: "basic"

  - id: "ch16-06-first-draft-010"
    front: "Why is the SKILL.md draft from this lesson not yet production-ready?"
    back: "It encodes the extraction material faithfully but has never been tested against the range of scenarios the agent will encounter in production. The Validation Loop in Lessons 7-8 tests the draft against constructed scenarios and real production inputs, revealing gaps the extraction process could not anticipate."
    tags: ["first-draft", "validation-needed"]
    difficulty: "basic"
