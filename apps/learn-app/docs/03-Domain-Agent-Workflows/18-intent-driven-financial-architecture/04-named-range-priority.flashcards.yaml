deck:
  id: "ch18-04-named-range-priority"
  title: "Named Range Priority — Guardrail 1"
  description: "Zero-coordinate-reference formulas, the compliance test, layer isolation enforcement, and the GP Waterfall calculation formulas."
  tags: ["named-range-priority", "guardrail-1", "IDFA", "compliance", "GP-waterfall", "layer-isolation"]
  version: 2

cards:
  - id: "ch18-04-named-range-priority-001"
    front: "What is the Named Range Priority compliance test?"
    back: "Read any Calculation layer formula — if you can understand it without clicking any referenced cell, it passes. If you must navigate to understand it, it fails."
    tags: ["compliance-test", "guardrail-1"]
    difficulty: "basic"

  - id: "ch18-04-named-range-priority-002"
    front: "Rewrite this coordinate formula as a Named Range formula: =B14-(C14*$F$8)"
    back: "=Revenue_Y2 - (Revenue_Y2 * COGS_Pct_Y2). The formula now reads as a business rule."
    tags: ["formula-conversion", "named-ranges"]
    difficulty: "intermediate"

  - id: "ch18-04-named-range-priority-003"
    front: "What are the two formula patterns allowed in the Calculation layer?"
    back: "1. Direct assignment from Assumptions (e.g. Revenue_Y1 = Inp_Rev_Y1)\n2. Arithmetic on Named Ranges already defined (e.g. Gross_Profit_Y2 = Revenue_Y2 - COGS_Y2)"
    tags: ["calculation-layer", "formula-patterns"]
    difficulty: "basic"

  - id: "ch18-04-named-range-priority-004"
    front: "Why does =Revenue_Y1 * 0.60 violate IDFA even though it uses a Named Range?"
    back: "The hardcoded 0.60 is an assumption hiding inside the Calculation layer, violating layer isolation. It should be Inp_COGS_Pct_Y1 in the Assumptions layer."
    tags: ["layer-isolation", "common-error"]
    difficulty: "intermediate"
    why: "How would you detect all hardcoded constants in a large model's Calculation layer?"

  - id: "ch18-04-named-range-priority-005"
    front: "What naming convention distinguishes Assumptions inputs from Calculation results?"
    back: "Assumptions use Inp_ prefix (e.g. Inp_Rev_Y1). Calculations use Variable_Dimension format (e.g. Revenue_Y2, Gross_Profit_Y3)."
    tags: ["naming-convention", "layers"]
    difficulty: "basic"

  - id: "ch18-04-named-range-priority-006"
    front: "Why can't Named Ranges contain spaces?"
    back: "Excel rejects names with spaces. Use underscores: Inp_Rev_Y1 not Inp Rev Y1."
    tags: ["naming-convention", "excel"]
    difficulty: "basic"

  - id: "ch18-04-named-range-priority-007"
    front: "How do Named Range formulas eliminate silent breakage from row insertion?"
    back: "Named Ranges point to a cell by name, not position. Revenue_Y2 resolves to the named cell regardless of where it sits — inserting rows cannot shift the reference."
    tags: ["named-ranges", "silent-breakage", "resilience"]
    difficulty: "intermediate"

  - id: "ch18-04-named-range-priority-008"
    front: "What are the four groups of the twelve GP Waterfall calculation formulas?"
    back: "Revenue (Y1-Y3)\nCOGS Percentage (Y1-Y3)\nCOGS Dollars (Y1-Y3)\nGross Profit (Y1-Y3)"
    tags: ["GP-waterfall", "formula-groups"]
    difficulty: "intermediate"

  - id: "ch18-04-named-range-priority-009"
    front: "Why is Guardrail 1 the foundation for all other IDFA guardrails?"
    back: "Guardrails 2-4 all assume Named Range compliance. LaTeX verification requires readable formulas, Intent Notes document visible business rules, MCP passes Named Ranges to Excel. Without Guardrail 1, the others cannot function."
    tags: ["guardrail-1", "foundation"]
    difficulty: "intermediate"
    why: "What would happen if you tried to apply LaTeX Verification to a coordinate-based formula?"

  - id: "ch18-04-named-range-priority-010"
    front: "How does an AI agent act as a compliance auditor for Guardrail 1?"
    back: "Prompt the agent to scan all Calculation layer formulas and report any containing coordinate references (A1-style or R1C1). The agent checks every formula in seconds."
    tags: ["AI-auditor", "compliance"]
    difficulty: "intermediate"
