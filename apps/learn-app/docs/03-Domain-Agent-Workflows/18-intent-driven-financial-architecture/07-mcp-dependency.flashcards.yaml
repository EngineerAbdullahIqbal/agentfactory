deck:
  id: "ch18-07-mcp-dependency"
  title: "MCP Dependency — Guardrail 4"
  description: "The Write-Calculate-Read workflow, Excel MCP Server tools, why agents must never calculate internally, and how MCP enables What-If and Goal-Seeking."
  tags: ["mcp-dependency", "guardrail-4", "IDFA", "write-calculate-read", "what-if", "goal-seeking", "excel-mcp"]
  version: 2

cards:
  - id: "ch18-07-mcp-dependency-001"
    front: "What does Guardrail 4 (MCP Dependency) prohibit a Finance Domain Agent from doing?"
    back: "Performing calculations internally. The agent must use write_cell and read_cell via the Excel MCP Server — all arithmetic is performed by Excel."
    tags: ["mcp-dependency", "guardrail-4", "definition"]
    difficulty: "basic"

  - id: "ch18-07-mcp-dependency-002"
    front: "What are the three steps of the Write-Calculate-Read workflow?"
    back: "1. Agent writes input via write_cell\n2. Excel recalculates all dependent cells\n3. Agent reads result via read_cell and reports it"
    tags: ["write-calculate-read", "workflow"]
    difficulty: "basic"

  - id: "ch18-07-mcp-dependency-003"
    front: "Why is an agent's internal calculation categorically different from a model's deterministic output?"
    back: "The agent's arithmetic may be incomplete, outdated, or missing conditional overrides. The model's output uses actual formulas with actual current values — only model results are audit-valid."
    tags: ["internal-calculation", "audit", "deterministic"]
    difficulty: "intermediate"
    why: "What specific model features could cause an agent's internal calculation to diverge from the model's result?"

  - id: "ch18-07-mcp-dependency-004"
    front: "What are the four core tools of an Excel MCP Server?"
    back: "write_cell(name, value)\nread_cell(name)\ninspect_model()\nread_formula(name)"
    tags: ["excel-mcp", "tools"]
    difficulty: "basic"

  - id: "ch18-07-mcp-dependency-005"
    front: "What is the most dangerous violation of Guardrail 4?"
    back: "Calculating a result internally and reporting it as if it came from the model. Internal and model results can differ due to rounding, conditionals, or changed assumptions."
    tags: ["guardrail-4", "violation", "danger"]
    difficulty: "intermediate"

  - id: "ch18-07-mcp-dependency-006"
    front: "How does an agent perform goal-seeking under MCP Dependency?"
    back: "By iterating: write an input via write_cell, read the target output via read_cell, compare to goal, adjust input, repeat until convergence. The agent never solves algebraically."
    tags: ["goal-seeking", "mcp-iteration"]
    difficulty: "intermediate"

  - id: "ch18-07-mcp-dependency-007"
    front: "In a what-if scenario, what does the agent contribute versus what does Excel contribute?"
    back: "The agent contributes reasoning — selecting the right Named Range and test value. Excel contributes mathematics — recalculating every formula deterministically."
    tags: ["what-if", "agent-vs-excel"]
    difficulty: "intermediate"
    why: "Why can't the agent shortcut the process by computing the what-if result from the formula it already read?"

  - id: "ch18-07-mcp-dependency-008"
    front: "What two Finance Domain Agent capabilities does MCP Dependency directly enable?"
    back: "Capability 2 — Deterministic What-If\nCapability 4 — Strategic Goal-Seeking"
    tags: ["capabilities", "what-if", "goal-seeking"]
    difficulty: "intermediate"

  - id: "ch18-07-mcp-dependency-009"
    front: "If a CFO asks 'where did these numbers come from?' after an MCP-dependent what-if analysis, what is the correct answer?"
    back: "The model calculated them. The agent wrote assumptions to Named Ranges, Excel recalculated, and the agent read back results. No number was estimated by the agent."
    tags: ["audit-trail", "accountability"]
    difficulty: "intermediate"

  - id: "ch18-07-mcp-dependency-010"
    front: "Why is multi-variable sensitivity analysis especially dangerous without MCP Dependency?"
    back: "Multiple variables changing simultaneously create compounding interactions that internal arithmetic cannot reliably account for. MCP routes everything through the model, which handles compound effects deterministically."
    tags: ["sensitivity-analysis", "compound-effects"]
    difficulty: "advanced"
    why: "How would you design a multi-variable sensitivity test to verify the agent is using MCP correctly?"
