deck:
  id: "ch15-08-division-of-responsibility"
  title: "The Division of Responsibility"
  description: "The three-way ownership model (knowledge worker, IT, administrator), layer independence principle, SKILL.md maintenance as ongoing discipline, and diagnosing failures by layer."
  tags: ["ownership-model", "division-of-responsibility", "layer-independence", "SKILL.md-maintenance", "plugin-accountability"]
  version: 1

cards:
  - id: "ch15-08-three-owners-001"
    front: "Name the three owners of a Cowork plugin and what each owns."
    back: "1. Knowledge worker — owns the SKILL.md (intelligence layer): Persona, Questions, Principles, and validation against domain scenarios\n2. IT — owns the integration layer: connector scripts and config.yaml\n3. Administrator — owns the governance layer: access control, audit configuration, shadow mode settings, and HITL gate enforcement"
    tags: ["three-owners", "ownership-model"]
    difficulty: "basic"

  - id: "ch15-08-degradation-002"
    front: "What failure mode does clear ownership prevent in deployed agents?"
    back: "Slow degradation — the kind that is hardest to detect precisely because the system continues to function, just not correctly. Without clear ownership, a SKILL.md encoding an outdated standard persists because each party assumes another is responsible. The system keeps running and producing plausible outputs while the gap between what it does and what it should do quietly widens."
    tags: ["degradation", "ownership-model", "diagnosability"]
    difficulty: "intermediate"

  - id: "ch15-08-layer-independence-003"
    front: "What is the layer independence principle?"
    back: "Each role operates within its own layer and has no incentive to intrude on the other two layers, because each layer contains only what that role understands and controls. IT does not need SKILL.md to maintain connectors. The knowledge worker does not need connector code to maintain SKILL.md. The administrator needs neither to configure governance. Dependencies are explicit and interfaces are clean."
    tags: ["layer-independence", "ownership-model"]
    difficulty: "intermediate"

  - id: "ch15-08-it-editing-skillmd-004"
    front: "What goes wrong if IT edits the SKILL.md Principles section to make the agent more conservative?"
    back: "BECAUSE IT lacks domain expertise, they cannot distinguish regulatory requirements from stylistic preferences, or know which edge cases the Principles were written to handle. THEREFORE the edit will seem reasonable to IT but produce an agent that is quietly wrong in ways neither IT nor users can easily detect — because the knowledge worker, who would notice, was not part of the change."
    tags: ["layer-independence", "IT", "SKILL.md"]
    difficulty: "intermediate"
    why: "Tests understanding of why layer independence protects against well-intentioned interference"

  - id: "ch15-08-diagnose-outdated-005"
    front: "An agent is returning analyses referencing a regulatory standard updated three months ago. Whose problem is this and why?"
    back: "The knowledge worker's problem. The SKILL.md's Principles section encodes the old standard. The knowledge worker must review and update the SKILL.md to reflect the current regulatory position. IT cannot help with this because connector scripts and config.yaml have not changed — the intelligence layer needs updating."
    tags: ["diagnosis", "SKILL.md-maintenance", "knowledge-worker"]
    difficulty: "intermediate"

  - id: "ch15-08-diagnose-access-006"
    front: "Users in the compliance department can no longer access the plugin, but the rest of the finance team can. Whose problem is this?"
    back: "An IT or administrator problem, depending on whether the issue is a connector permission change (IT) or an access control misconfiguration (administrator). The knowledge worker's SKILL.md is not involved — the agent's logic has not changed, only who can reach it."
    tags: ["diagnosis", "access-control", "administrator", "IT"]
    difficulty: "intermediate"

  - id: "ch15-08-diagnose-scope-007"
    front: "The agent is occasionally drawing on client data from accounts it should not have access to. Whose problem is this?"
    back: "IT's problem. Connector scope is configured in the config.yaml and implemented in the connector scripts — both owned by IT. The knowledge worker may have specified the required scope, but the misconfiguration lives in the integration layer. Rewriting the SKILL.md cannot fix a connector scope error."
    tags: ["diagnosis", "connector-scope", "IT"]
    difficulty: "intermediate"

  - id: "ch15-08-skillmd-maintenance-008"
    front: "Why is SKILL.md maintenance an ongoing professional discipline rather than a one-time authorship task?"
    back: "Domain expertise evolves (regulatory standards change, legislation amends), organisational standards change (new mandates, mergers alter jurisdictions), and new edge cases surface in production that shadow mode did not reveal. A compliance officer who maintains their firm's risk criteria reviews them when regulations change. The SKILL.md requires the same discipline — treating it as write-once produces an agent that will slowly drift from what it should do."
    tags: ["SKILL.md-maintenance", "ongoing-discipline", "knowledge-worker"]
    difficulty: "intermediate"

  - id: "ch15-08-monitoring-overlap-009"
    front: "Which ownership responsibilities overlap between roles, and why is that overlap bounded?"
    back: "Validation and performance monitoring. Validation belongs primarily to the knowledge worker because assessing correct outputs requires domain expertise. Performance monitoring is shared — the knowledge worker reads the quality dimension of the audit log; IT monitors the technical dimension (connector health, latency, error rates). The overlap is explicit and bounded to these two tasks."
    tags: ["overlap", "monitoring", "validation", "shared-responsibility"]
    difficulty: "intermediate"

  - id: "ch15-08-diagnosability-010"
    front: "What is the practical value of diagnosability in a deployed plugin?"
    back: "BECAUSE clear ownership means the question 'whose problem is this?' has a definitive answer. THEREFORE the time from 'something is wrong' to 'the right person is working on it' collapses. Without the ownership model, ambiguous accountability produces email chains that go nowhere and allows degradation to continue while multiple teams assume someone else is responsible."
    tags: ["diagnosability", "ownership-model", "applied"]
    difficulty: "intermediate"
    why: "Tests the operational value of the ownership model, not just its structure"
