deck:
  id: "thesis-agent-factory"
  title: "The Agent Factory Thesis"
  description: "Core thesis concepts: the paradigm shift from SaaS to AI employees, the Industrialized Stack, the Factory mechanics, and the workforce opportunity."
  tags: ["agent-factory", "thesis", "paradigm-shift", "digital-fte"]
  version: 1

cards:
  - id: "thesis-agent-factory-001"
    front: "In the Agent Factory thesis, what do the most valuable companies manufacture instead of selling software?"
    back: "AI employees (Digital FTEs)"
    tags: ["agent-factory", "digital-fte"]
    difficulty: "basic"

  - id: "thesis-agent-factory-002"
    front: "A company builds powerful AI agents on solid cloud infrastructure, but revenue flatlines. Why?"
    back: "Because technology alone doesn't generate revenue — the Agent Factory requires all three pillars (agents, infrastructure, AND business model). Missing the business model means no way to monetize outcomes."
    tags: ["agent-factory", "business-model"]
    difficulty: "intermediate"
    why: "How does selling per-outcome results differ from selling per-seat subscriptions?"

  - id: "thesis-agent-factory-003"
    front: "In the Agent Factory paradigm shift table, what replaces per-seat subscriptions as the value metric?"
    back: "Per-outcome results"
    tags: ["paradigm-shift", "value-metric"]
    difficulty: "basic"

  - id: "thesis-agent-factory-004"
    front: "Why does the Agent Factory model shift focus from HOW work is done to THAT it is done verifiably correct?"
    back: "Because when agents handle execution, the human no longer controls the process step-by-step. Therefore, verification of outcomes becomes the only reliable quality signal."
    tags: ["paradigm-shift", "verification"]
    difficulty: "intermediate"
    why: "What new failure modes appear when you can't observe the execution process?"

  - id: "thesis-agent-factory-005"
    front: "What are the three layers of the Industrialized Stack in the Agent Factory thesis?"
    back: "1. Intent\n2. The Factory\n3. Outcome"
    tags: ["industrialized-stack"]
    difficulty: "basic"

  - id: "thesis-agent-factory-006"
    front: "What does 'Intent' include in the Industrialized Stack?"
    back: "Goals, constraints, budgets, and permissions"
    tags: ["industrialized-stack", "intent"]
    difficulty: "basic"

  - id: "thesis-agent-factory-007"
    front: "How do specs, skills, and feedback loops relate to each other inside The Factory?"
    back: "Specs define WHAT work to do, skills package HOW to do it, and feedback loops ensure quality improves over time. They form an integrated pipeline, not independent components."
    tags: ["factory-mechanics", "specs", "skills"]
    difficulty: "intermediate"
    why: "What breaks if you have specs and skills but no feedback loops?"

  - id: "thesis-agent-factory-008"
    front: "Why does the thesis use a manufacturing factory — not a marketplace or network — as its central analogy?"
    back: "Because a factory implies standardized stations, repeatable processes, and quality control — exactly the properties specs, skills, and feedback loops provide. A marketplace lacks that predictable pipeline."
    tags: ["factory-mechanics", "analogy"]
    difficulty: "intermediate"
    why: "When would an agent marketplace model actually be preferable to a factory model?"

  - id: "thesis-agent-factory-009"
    front: "What role does MCP play in The Factory?"
    back: "Universal protocol connecting every agent to every tool"
    tags: ["mcp", "factory-mechanics"]
    difficulty: "basic"

  - id: "thesis-agent-factory-010"
    front: "The thesis claims AI paired with a human outperforms either alone. If true, why would a company still be tempted to remove the human entirely?"
    back: "Because removing humans cuts labor costs and speeds execution. However, this sacrifices the verification quality that makes outcomes trustworthy — optimizing for speed over correctness."
    tags: ["human-in-the-loop", "anti-patterns"]
    difficulty: "advanced"
    why: "In which task categories might fully autonomous agents actually be the right choice?"

  - id: "thesis-agent-factory-011"
    front: "What three role transitions does the thesis describe for humans in the Agent Factory era?"
    back: "1. Operator → Supervisor\n2. Typist → Editor\n3. Coder → Architect of outcomes"
    tags: ["human-in-the-loop", "role-transition"]
    difficulty: "intermediate"

  - id: "thesis-agent-factory-012"
    front: "Why does job unbundling create new opportunity rather than pure displacement?"
    back: "Because breaking jobs into tasks creates novel recombinations — new roles, businesses, and markets that couldn't exist when work was locked inside rigid job titles."
    tags: ["workforce", "unbundling"]
    difficulty: "intermediate"
    why: "Can you name a role that exists today only because a previous job was unbundled?"

  - id: "thesis-agent-factory-013"
    front: "What must the future workforce build instead of relying on fixed career paths?"
    back: "Dynamic skill portfolios"
    tags: ["workforce", "skill-portfolios"]
    difficulty: "basic"

  - id: "thesis-agent-factory-014"
    front: "A veteran React developer fears AI will make them obsolete. Based on the thesis, why is the opposite more likely?"
    back: "Because their systems expertise (data flows, APIs, user needs) becomes more valuable when applied to designing and supervising agents — they do MORE, not less, since they're no longer limited to hand-coding screens."
    tags: ["human-in-the-loop", "developer-role"]
    difficulty: "advanced"
    why: "What specific skills distinguish a developer who thrives from one who stalls?"
