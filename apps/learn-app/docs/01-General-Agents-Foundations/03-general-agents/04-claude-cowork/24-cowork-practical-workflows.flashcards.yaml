deck:
  id: "ch03-cowork-practical-workflows"
  title: "Cowork in Action: Practical Workflows"
  description: "Flashcards covering Claude Cowork practical workflow patterns, workflow design steps, efficiency metrics, and common pitfalls."
  tags: [cowork, workflows, automation, file-operations, batch-processing]
  version: 1

cards:
  - id: "ch03-cowork-practical-workflows-001"
    type: recall
    front: "What are the four workflow patterns that make Claude Cowork effective across all tasks?"
    back: "Explore First\nPropose Then Execute\nHandle Variation\nReport Results"
    tags: [workflow-patterns]
    difficulty: "basic"

  - id: "ch03-cowork-practical-workflows-002"
    type: recall
    front: "What are the four steps in designing your own Cowork workflow?"
    back: "Identify repetitive tasks\nClarify desired outcome\nProvide context and constraints\nReview and refine"
    tags: [workflow-design]
    difficulty: "basic"

  - id: "ch03-cowork-practical-workflows-003"
    type: recall
    front: "In the Downloads folder workflow, how many files were organized and in how long?"
    back: "186 files organized in 45 seconds."
    tags: [efficiency, file-organization]
    difficulty: "basic"

  - id: "ch03-cowork-practical-workflows-004"
    type: recall
    front: "What speed improvement does the lesson report for research synthesis using Cowork?"
    back: "144x faster (3+ days to 30 minutes)."
    tags: [efficiency, research]
    difficulty: "basic"

  - id: "ch03-cowork-practical-workflows-005"
    type: recall
    front: "What four common pitfalls does the lesson warn about when using Cowork workflows?"
    back: "Vague instructions\nMissing approval review\nNo backup strategy\nOverly complex initial requests"
    tags: [pitfalls, best-practices]
    difficulty: "basic"

  - id: "ch03-cowork-practical-workflows-006"
    type: recall
    front: "What system tool does Claude Cowork delegate to for video format conversion in Workflow 2?"
    back: "FFmpeg for video processing."
    tags: [batch-processing, tools]
    difficulty: "intermediate"

  - id: "ch03-cowork-practical-workflows-007"
    type: recall
    front: "What speed improvement does the lesson report for batch video conversion using Cowork?"
    back: "48x faster (8 hours to 10 minutes)."
    tags: [efficiency, batch-processing]
    difficulty: "intermediate"

  - id: "ch03-cowork-practical-workflows-008"
    type: recall
    front: "What four sections does the weekly finance report workflow specify for its Word document output?"
    back: "Executive summary\nTop 10 vendors table\nNotable changes\nSpend distribution charts"
    tags: [report-generation, workflow-design]
    difficulty: "intermediate"

  - id: "ch03-cowork-practical-workflows-009"
    type: thinking
    front: "Why does the Explore First pattern ensure more accurate execution by Cowork?"
    back: "BECAUSE scanning folders, reading file headers, and identifying structure first means Cowork understands the actual data before acting, THEREFORE avoiding errors from wrong assumptions about file types or layout."
    why: "What could go wrong if Cowork skipped the exploration phase?"
    tags: [workflow-patterns, accuracy]
    difficulty: "intermediate"

  - id: "ch03-cowork-practical-workflows-010"
    type: thinking
    front: "Why does the lesson argue Cowork makes previously infeasible tasks possible?"
    back: "BECAUSE tasks like organizing hundreds of files or synthesizing 65 documents are too time-consuming to do manually, THEREFORE they simply never get done without automation, regardless of their value."
    why: "What distinguishes speed improvement from feasibility improvement?"
    tags: [automation-value, efficiency]
    difficulty: "intermediate"

  - id: "ch03-cowork-practical-workflows-011"
    type: thinking
    front: "How do vague instructions versus specific instructions affect Cowork workflow outcomes?"
    back: "Vague instructions like 'clean up this folder' leave Claude guessing at intent, THEREFORE producing unpredictable results. Specific instructions like 'organize by type into subfolders' define the exact outcome, BECAUSE Claude needs explicit criteria to match your expectations."
    why: "What makes specificity critical when delegating to an AI agent?"
    tags: [pitfalls, prompt-design]
    difficulty: "intermediate"

  - id: "ch03-cowork-practical-workflows-012"
    type: thinking
    front: "Why is the Propose Then Execute pattern critical for deletion or modification operations?"
    back: "BECAUSE destructive operations like deleting files cannot be easily undone, showing proposals first lets you catch errors before execution, THEREFORE preventing data loss from misinterpretation of instructions."
    why: "What risk does skipping the approval step introduce for file operations?"
    tags: [workflow-patterns, safety]
    difficulty: "intermediate"

  - id: "ch03-cowork-practical-workflows-013"
    type: thinking
    front: "Why does the lesson recommend starting with simpler workflows before attempting complex ones?"
    back: "BECAUSE complex multi-step workflows compound errors from each step, starting simple lets you verify each operation works correctly in isolation, THEREFORE building reliable components before combining them."
    why: "How does incremental complexity reduce risk in automation?"
    tags: [pitfalls, workflow-design]
    difficulty: "intermediate"

  - id: "ch03-cowork-practical-workflows-014"
    type: thinking
    front: "How does Cowork's Handle Variation pattern adapt to messy real-world files?"
    back: "BECAUSE real files have different formats, inconsistent naming, and missing metadata, Claude adjusts its approach based on what it actually finds rather than assuming uniformity, THEREFORE handling edge cases that would break rigid scripts."
    why: "What advantage does adaptive handling have over fixed automation scripts?"
    tags: [workflow-patterns, adaptability]
    difficulty: "advanced"

  - id: "ch03-cowork-practical-workflows-015"
    type: thinking
    front: "Why is consistency a distinct business value of automated report generation beyond time savings?"
    back: "BECAUSE automated reports follow identical format and calculations every time, human reviewers can focus on analyzing insights rather than verifying mechanics, THEREFORE reducing errors and enabling pattern detection across weeks."
    why: "How does format consistency change what humans focus on during review?"
    tags: [report-generation, business-value]
    difficulty: "advanced"

  - id: "ch03-cowork-practical-workflows-016"
    type: thinking
    front: "How does translating a manual process into a Cowork prompt develop a transferable workflow design skill?"
    back: "BECAUSE decomposing manual work into desired outcomes, required inputs, and constraints is the same skill needed for any automation tool, THEREFORE practicing with Cowork builds a general capability applicable beyond a single platform."
    why: "What general skill does Cowork prompt writing develop?"
    tags: [workflow-design, transferable-skills]
    difficulty: "advanced"
