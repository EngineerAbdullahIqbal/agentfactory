name: PR Build Check

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/learn-app/**"
      - "libs/docusaurus/**"

jobs:
  build:
    name: Check Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          filter: blob:none
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Increase swap for multi-locale build
        run: |
          sudo swapoff -a
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core fonts-liberation libvips-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        working-directory: apps/learn-app
        run: pnpm build