deck:
  id: "eval-f05-context-window-budgeting"
  title: "Eval F05 Context Window Budgeting"
  description: "Chapter-mode deck for context token allocation, truncation risk, and semantic compression strategy."
  tags: ["evaluation", "context-window", "budgeting"]
  version: 1

cards:
  - id: "eval-f05-context-window-budgeting-001"
    front: "What context split is suggested in the lesson?"
    back: "40% user task context, 30% retrieved memory/docs, 20% tool outputs, 10% safety/policy constraints."
    tags: ["token-budget", "allocation"]
    difficulty: "basic"

  - id: "eval-f05-context-window-budgeting-002"
    front: "Why can oldest-first truncation break agent reliability?"
    back: "It may remove still-binding constraints simply because they are old, creating instruction drift and policy violations despite newer context being preserved."
    tags: ["truncation", "risk"]
    difficulty: "intermediate"
    why: "How would you detect when truncation removed a hard constraint?"

  - id: "eval-f05-context-window-budgeting-003"
    front: "What are the three semantic compression steps?"
    back: "Keep hard constraints verbatim, summarize low-risk narrative, and drop redundant examples."
    tags: ["compression", "steps"]
    difficulty: "intermediate"

  - id: "eval-f05-context-window-budgeting-004"
    front: "How does semantic compression outperform blunt truncation?"
    back: "It preserves decision-critical constraints while reducing low-value text, lowering failure risk without losing operational signal that governs agent behavior and safety compliance."
    tags: ["compression", "strategy"]
    difficulty: "intermediate"
    why: "Why should hard constraints remain verbatim during compression?"

  - id: "eval-f05-context-window-budgeting-005"
    front: "Which budget segment is reserved for safety and policy constraints?"
    back: "10% of the context window is reserved for safety and policy constraints."
    tags: ["allocation", "safety"]
    difficulty: "basic"

  - id: "eval-f05-context-window-budgeting-006"
    front: "Why does token budgeting reduce instruction collisions?"
    back: "A clear allocation prevents uncontrolled context growth that can introduce contradictory instructions and degrade model adherence, keeping the prompt internally consistent and reliable."
    tags: ["collisions", "budgeting"]
    difficulty: "intermediate"
    why: "How would collision incidents appear in agent behavior logs?"

  - id: "eval-f05-context-window-budgeting-007"
    front: "What is one operational benefit of disciplined token budgeting?"
    back: "Improved latency from smaller, more relevant prompts."
    tags: ["latency", "operations"]
    difficulty: "basic"

  - id: "eval-f05-context-window-budgeting-008"
    front: "How should budgeting adapt when tool outputs spike unexpectedly?"
    back: "Rebalance by compressing lower-risk narrative and preserving hard constraints, rather than dropping safety or task-critical instructions that govern agent reliability and compliance."
    tags: ["adaptation", "tool-outputs"]
    difficulty: "advanced"
    why: "Why is policy context usually the last segment to cut?"
